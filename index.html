document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

60d3-4626-8840-400d0b801346\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0c1420; }\n  * { box-sizing: border-box; }\n  a { color: #7fd0c8; text-decoration: none; }\n  a:hover { color: #a8e8e0; text-decoration: underline; }\n  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n  @keyframes riseIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }\n  @keyframes pulseDot { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }\n  @keyframes flowDash { to { stroke-dashoffset: -28; } }\n  @keyframes bobShip { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-9px) rotate(2deg); } }\n  @keyframes waveSlide { 0% { transform: translateX(0); } 100% { transform: translateX(-140px); } }\n  @keyframes sweepIn { 0% { transform: translateY(101%); } 100% { transform: translateY(0); } }\n  @keyframes zoomAway { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.06); opacity: 0; } }\n  @keyframes glintMove { 0% { transform: translateX(-120%) skewX(-18deg); } 100% { transform: translateX(240%) skewX(-18deg); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Theme chooser\" style=\"position: fixed; inset: 0; font-family: 'Baloo 2', sans-serif; overflow: hidden; display: flex; flex-direction: column;\">\n\n  <!-- header -->\n  <div style=\"flex-shrink: 0; text-align: center; padding: 26px 20px 18px; background: #0c1420; position: relative; z-index: 2;\">\n    <div style=\"font-size: clamp(24px, 3vw, 38px); font-weight: 800; color: #f0f4f8; letter-spacing: 0.5px;\">Sri Krishna Sai Kota<\u002Fdiv>\n    <div style=\"font-size: clamp(14px, 1.5vw, 17px); font-weight: 600; color: #7a8ba0; margin-top: 2px;\">Data Engineer · two ways to explore the same story. Pick your adventure.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- the two doors -->\n  <div style=\"flex: 1; display: flex; min-height: 0; position: relative;\">\n\n    <!-- ETL / professional door -->\n    <div sc-camel-on-click=\"{{ chooseEtl }}\" style=\"flex: 1; position: relative; overflow: hidden; cursor: pointer; background: linear-gradient(160deg, #101b2c 0%, #0e2438 55%, #0a2f42 100%); border-right: 2px solid #0c1420; transition: flex 0.45s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; justify-content: center;\" style-hover=\"flex: 1.35;\">\n      <!-- pipeline diagram backdrop -->\n      <svg sc-camel-preserve-aspect-ratio=\"xMidYMid slice\" sc-camel-view-box=\"0 0 600 500\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.5;\">\n        <g fill=\"none\" stroke=\"#1e4a66\" stroke-width=\"2.5\">\n          <path d=\"M60 120 H 180 Q 200 120 200 140 V 220 Q 200 240 220 240 H 380\" stroke-dasharray=\"8 10\" style=\"animation: flowDash 1.6s linear infinite;\"><\u002Fpath>\n          <path d=\"M60 380 H 160 Q 180 380 180 360 V 280 Q 180 260 200 260 H 380\" stroke-dasharray=\"8 10\" style=\"animation: flowDash 2s linear infinite;\"><\u002Fpath>\n          <path d=\"M420 250 H 540\" stroke-dasharray=\"8 10\" style=\"animation: flowDash 1.3s linear infinite;\"><\u002Fpath>\n        <\u002Fg>\n        <rect x=\"24\" y=\"96\" width=\"72\" height=\"48\" rx=\"8\" fill=\"#132c42\" stroke=\"#2a5f82\" stroke-width=\"2.5\"><\u002Frect>\n        <rect x=\"24\" y=\"356\" width=\"72\" height=\"48\" rx=\"8\" fill=\"#132c42\" stroke=\"#2a5f82\" stroke-width=\"2.5\"><\u002Frect>\n        <rect x=\"380\" y=\"216\" width=\"64\" height=\"68\" rx=\"8\" fill=\"#132c42\" stroke=\"#2a5f82\" stroke-width=\"2.5\"><\u002Frect>\n        <ellipse cx=\"560\" cy=\"234\" rx=\"26\" ry=\"10\" fill=\"#132c42\" stroke=\"#2a5f82\" stroke-width=\"2.5\"><\u002Fellipse>\n        <path d=\"M534 234 V 274 Q 534 284 560 284 Q 586 284 586 274 V 234\" fill=\"#132c42\" stroke=\"#2a5f82\" stroke-width=\"2.5\"><\u002Fpath>\n        <circle cx=\"140\" cy=\"120\" r=\"4\" fill=\"#4ecbc4\" style=\"animation: pulseDot 1.4s ease-in-out infinite;\"><\u002Fcircle>\n        <circle cx=\"300\" cy=\"240\" r=\"4\" fill=\"#4ecbc4\" style=\"animation: pulseDot 1.8s ease-in-out infinite;\"><\u002Fcircle>\n        <circle cx=\"480\" cy=\"250\" r=\"4\" fill=\"#4ecbc4\" style=\"animation: pulseDot 1.1s ease-in-out infinite;\"><\u002Fcircle>\n      <\u002Fsvg>\n      <div style=\"position: relative; text-align: center; padding: 24px; animation: riseIn 0.7s ease 0.15s both;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: #4ecbc4; letter-spacing: 3px; margin-bottom: 10px;\">$ ./portfolio --mode=professional<\u002Fdiv>\n        <div style=\"font-size: clamp(30px, 4vw, 52px); font-weight: 800; color: #f0f4f8; line-height: 1.05;\">ETL Theme<\u002Fdiv>\n        <div style=\"font-size: clamp(14px, 1.4vw, 17px); font-weight: 500; color: #9ab0c4; max-width: 340px; margin: 10px auto 22px;\">The straight pipeline: clean, recruiter-ready portfolio. Extract my experience, transform it into insight, load it into your team.<\u002Fdiv>\n        <div style=\"position: relative; display: inline-flex; align-items: center; gap: 10px; background: #4ecbc4; color: #0c1420; font-weight: 800; font-size: 16px; padding: 12px 28px; border-radius: 10px; overflow: hidden; box-shadow: 0 6px 20px rgba(78,203,196,0.35);\">\n          <span style=\"position: absolute; top: 0; bottom: 0; left: 0; width: 40%; background: rgba(255,255,255,0.35); animation: glintMove 2.8s ease-in-out infinite;\"><\u002Fspan>\n          <span style=\"position: relative;\">Run the pipeline →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Pirate door -->\n    <div sc-camel-on-click=\"{{ choosePirate }}\" style=\"flex: 1; position: relative; overflow: hidden; cursor: pointer; background: linear-gradient(160deg, #e8d5a8 0%, #d9c08a 45%, #6f9384 100%); transition: flex 0.45s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; justify-content: center;\" style-hover=\"flex: 1.35;\">\n      <!-- parchment sea backdrop -->\n      <svg sc-camel-preserve-aspect-ratio=\"xMidYMid slice\" sc-camel-view-box=\"0 0 600 500\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.55;\">\n        <g fill=\"none\" stroke=\"#8a6a3a\" stroke-width=\"2\" opacity=\"0.6\">\n          <path d=\"M80 90 q 12 -9 24 0 M 94 99 q 10 -6 20 0\"><\u002Fpath>\n          <path d=\"M480 130 q 12 -9 24 0\"><\u002Fpath>\n          <path d=\"M120 420 q 12 -9 24 0 M 134 429 q 10 -6 20 0\"><\u002Fpath>\n          <path d=\"M500 400 q 12 -9 24 0\"><\u002Fpath>\n        <\u002Fg>\n        <g transform=\"translate(500 70)\" opacity=\"0.8\">\n          <circle cx=\"0\" cy=\"0\" r=\"34\" fill=\"none\" stroke=\"#6b4a2a\" stroke-width=\"2.5\"><\u002Fcircle>\n          <path d=\"M0 -30 L 5 0 L 0 30 L -5 0 Z\" fill=\"#a83226\"><\u002Fpath>\n          <path d=\"M-30 0 L 0 -5 L 30 0 L 0 5 Z\" fill=\"#6b4a2a\"><\u002Fpath>\n        <\u002Fg>\n        <path d=\"M60 260 Q 40 230 80 216 Q 96 196 130 200 Q 160 190 180 212 Q 206 222 196 250 Q 186 276 140 278 Q 90 282 60 260 Z\" fill=\"#d0b878\" stroke=\"#6b4a2a\" stroke-width=\"3\"><\u002Fpath>\n        <path d=\"M112 216 Q 108 194 118 184 M 118 184 Q 104 174 92 178 M 118 184 Q 132 172 144 176\" stroke=\"#5a3a20\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M96 246 l 7 7 M 103 246 l -7 7\" stroke=\"#a83226\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fpath>\n      <\u002Fsvg>\n      <!-- waves at the bottom -->\n      <div style=\"position: absolute; left: -160px; right: -160px; bottom: -8px; height: 90px; overflow: hidden;\">\n        <svg sc-camel-preserve-aspect-ratio=\"none\" sc-camel-view-box=\"0 0 1400 90\" style=\"position: absolute; inset: 0; width: calc(100% + 140px); height: 100%; animation: waveSlide 8s linear infinite;\"><path d=\"M0 40 Q 70 14 140 40 T 280 40 T 420 40 T 560 40 T 700 40 T 840 40 T 980 40 T 1120 40 T 1260 40 T 1400 40 V 90 H 0 Z\" fill=\"#4f7f8b\" opacity=\"0.8\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <!-- little ship -->\n      <div style=\"position: absolute; right: 12%; bottom: 34px; width: 74px; animation: bobShip 3.8s ease-in-out infinite;\">\n        <svg sc-camel-view-box=\"0 0 120 110\" style=\"width: 100%; display: block;\">\n          <rect x=\"56\" y=\"8\" width=\"4.5\" height=\"62\" rx=\"2\" fill=\"#3a2c16\"><\u002Frect>\n          <path d=\"M62 12 Q 100 34 62 62 Z\" fill=\"#f3e6c3\" stroke=\"#c9b088\" stroke-width=\"2\"><\u002Fpath>\n          <path d=\"M54 16 Q 26 36 54 60 Z\" fill=\"#e8d3a8\" stroke=\"#c9b088\" stroke-width=\"2\"><\u002Fpath>\n          <path d=\"M60 2 L 88 7 L 60 14 Z\" fill=\"#1c1a17\"><\u002Fpath>\n          <path d=\"M12 70 L 106 70 Q 102 94 74 97 L 40 97 Q 16 94 12 70 Z\" fill=\"#5a3a20\" stroke=\"#3a2410\" stroke-width=\"3.5\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"position: relative; text-align: center; padding: 24px; animation: riseIn 0.7s ease 0.3s both;\">\n        <div style=\"font-family: 'IM Fell English', serif; font-style: italic; font-size: 15px; color: #5a4322; letter-spacing: 1px; margin-bottom: 8px;\">~ a message in a bottle awaits ~<\u002Fdiv>\n        <div style=\"font-family: 'Pirata One', cursive; font-size: clamp(34px, 4.6vw, 58px); color: #3d2812; line-height: 1; letter-spacing: 2px; text-shadow: 1px 1px 0 rgba(255,240,200,0.6);\">Pirate Theme<\u002Fdiv>\n        <div style=\"font-family: 'IM Fell English', serif; font-size: clamp(14px, 1.4vw, 17px); color: #5a4322; max-width: 330px; margin: 10px auto 22px;\">The adventurer's chart: sail a pirate ship across seven isles, plunder every section, an' collect the stamps.<\u002Fdiv>\n        <div style=\"position: relative; display: inline-flex; align-items: center; gap: 10px; background: #a83226; color: #f6ead0; font-weight: 800; font-size: 16px; padding: 12px 28px; border-radius: 10px; overflow: hidden; box-shadow: 0 6px 20px rgba(120,40,20,0.4); border: 2px solid #7a1f12;\">\n          <span style=\"position: absolute; top: 0; bottom: 0; left: 0; width: 40%; background: rgba(255,255,255,0.25); animation: glintMove 2.8s ease-in-out 1.2s infinite;\"><\u002Fspan>\n          <span style=\"position: relative;\">Set sail ⚓<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- center divider badge -->\n    <div style=\"position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 3; width: 64px; height: 64px; border-radius: 50%; background: #0c1420; border: 3px solid #2a3a4e; color: #f0f4f8; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; box-shadow: 0 0 0 8px rgba(12,20,32,0.45); pointer-events: none;\">OR<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- transition overlay -->\n  <sc-if value=\"{{ transitioning }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: absolute; inset: 0; z-index: 10; pointer-events: all;\">\n      <div style=\"position: absolute; inset: 0; background: {{ overlayBg }}; animation: sweepIn 0.55s cubic-bezier(0.6,0,0.2,1) both; display: flex; align-items: center; justify-content: center;\">\n        <div style=\"text-align: center; animation: fadeIn 0.4s ease 0.35s both;\">\n          <div style=\"font-size: 44px;\">{{ overlayIcon }}<\u002Fdiv>\n          <div style=\"font-weight: 800; font-size: 22px; color: {{ overlayText }}; margin-top: 6px;\">{{ overlayLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot;}, &quot;etlUrl&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;etl.html&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Links&quot;}, &quot;pirateUrl&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;pirate.html&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Links&quot;}}\">\nclass Component extends DCLogic {\n  state = { transitioning: false, choice: null };\n\n  navigate(choice) {\n    if (this.state.transitioning) return;\n    this.setState({ transitioning: true, choice });\n    const url = choice === 'etl'\n      ? (this.props.etlUrl ?? 'etl.html')\n      : (this.props.pirateUrl ?? 'pirate.html');\n    setTimeout(() => { window.location.href = url; }, 900);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const etl = s.choice === 'etl';\n    return {\n      chooseEtl: () => this.navigate('etl'),\n      choosePirate: () => this.navigate('pirate'),\n      transitioning: s.transitioning,\n      overlayBg: etl\n        ? 'linear-gradient(160deg, #101b2c 0%, #0a2f42 100%)'\n        : 'linear-gradient(160deg, #e8d5a8 0%, #6f9384 100%)',\n      overlayIcon: etl ? '\\u2699\\ufe0f' : '\\u2620\\ufe0f',\n      overlayLabel: etl ? 'Running pipeline\\u2026' : 'Settin\\u2019 sail\\u2026',\n      overlayText: etl ? '#4ecbc4' : '#3d2812',\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
